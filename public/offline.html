<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Calorie Vision</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
    }
    
    .icon-wrapper {
      width: 120px;
      height: 120px;
      margin: 0 auto 2rem;
      background: #e2e8f0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .icon-wrapper svg {
      width: 60px;
      height: 60px;
      color: #64748b;
    }
    
    h1 {
      font-size: 2rem;
      color: #1e293b;
      margin-bottom: 1rem;
    }
    
    p {
      color: #64748b;
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    
    button {
      background: #22c55e;
      color: white;
      border: none;
      padding: 1rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 0.75rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: background 0.2s, transform 0.1s;
    }
    
    button:hover {
      background: #16a34a;
    }
    
    button:active {
      transform: scale(0.98);
    }
    
    button svg {
      width: 20px;
      height: 20px;
    }
    
    .tips {
      margin-top: 3rem;
      padding: 1.5rem;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 1rem;
      text-align: left;
    }
    
    .tips h2 {
      font-size: 1rem;
      color: #1e293b;
      margin-bottom: 1rem;
    }
    
    .tips ul {
      list-style: none;
    }
    
    .tips li {
      color: #64748b;
      font-size: 0.9rem;
      padding: 0.5rem 0;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
    }
    
    .tips li::before {
      content: "•";
      color: #22c55e;
      font-weight: bold;
    }
    
    @media (prefers-color-scheme: dark) {
      body {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      }
      
      .icon-wrapper {
        background: #334155;
      }
      
      .icon-wrapper svg {
        color: #94a3b8;
      }
      
      h1 {
        color: #f1f5f9;
      }
      
      p {
        color: #94a3b8;
      }
      
      .tips {
        background: rgba(30, 41, 59, 0.7);
      }
      
      .tips h2 {
        color: #f1f5f9;
      }
      
      .tips li {
        color: #94a3b8;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a5 5 0 01-1.414-3.536 5 5 0 011.414-3.536m-2.829 2.829L3 10m8 8l2.828-2.828m0 0a3 3 0 00-4.243-4.243" />
      </svg>
    </div>
    
    <h1>You're Offline</h1>
    
    <p>It looks like you've lost your internet connection. Please check your network settings and try again.</p>
    
    <button onclick="window.location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
      </svg>
      Try Again
    </button>
    
    <div class="tips">
      <h2>Tips to reconnect:</h2>
      <ul>
        <li>Check if Wi-Fi or mobile data is enabled</li>
        <li>Move closer to your router</li>
        <li>Try turning airplane mode on and off</li>
        <li>Restart your device</li>
      </ul>
    </div>
  </div>
</body>
</html>
